<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7FC4E8"/><stop offset="55%" stop-color="#5BA9D6"/><stop offset="100%" stop-color="#2E86C1"/>
    </linearGradient>
    <linearGradient id="hexStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9D6EF"/><stop offset="100%" stop-color="#1F6FA8"/>
    </linearGradient>
    <radialGradient id="glow" cx="38%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.32"/><stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1F6FA8" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#soft)">
    <path d="M256 38 L420 132 Q444 146 444 174 L444 338 Q444 366 420 380 L256 474 L92 380 Q68 366 68 338 L68 174 Q68 146 92 132 Z"
          fill="url(#hexGrad)" stroke="url(#hexStroke)" stroke-width="10"/>
    <path d="M256 38 L420 132 Q444 146 444 174 L444 338 Q444 366 420 380 L256 474 L92 380 Q68 366 68 338 L68 174 Q68 146 92 132 Z"
          fill="url(#glow)"/>
  </g>

  <!-- ===== DNA double helix, strands = curves, rungs = network edges, nodes at junctions =====
       Two sine-like strands crossing; rungs connect them; nodes sit where rungs meet strands. -->
  <g stroke="#FFFFFF" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.97">
    <!-- strand 1 -->
    <path d="M196 138
             C300 178 300 238 196 278
             C92 318 92 378 196 418" transform="translate(60,-22)"/>
    <!-- strand 2 -->
    <path d="M316 138
             C212 178 212 238 316 278
             C420 318 420 378 316 418" transform="translate(-60,-22)"/>
  </g>

  <!-- rungs (network connections between strands) -->
  <g stroke="#FFFFFF" stroke-width="6" stroke-opacity="0.85" stroke-linecap="round">
    <line x1="256" y1="138" x2="256" y2="138"/>
    <line x1="220" y1="150" x2="292" y2="150"/>
    <line x1="200" y1="184" x2="312" y2="184"/>
    <line x1="210" y1="218" x2="302" y2="218"/>
    <line x1="256" y1="256" x2="256" y2="256"/>
    <line x1="210" y1="294" x2="302" y2="294"/>
    <line x1="200" y1="328" x2="312" y2="328"/>
    <line x1="220" y1="362" x2="292" y2="362"/>
  </g>

  <!-- nodes along the strands -->
  <g fill="#FFFFFF">
    <circle cx="220" cy="150" r="11"/><circle cx="292" cy="150" r="11"/>
    <circle cx="200" cy="184" r="11"/><circle cx="312" cy="184" r="11"/>
    <circle cx="210" cy="218" r="11"/><circle cx="302" cy="218" r="11"/>
    <circle cx="210" cy="294" r="11"/><circle cx="302" cy="294" r="11"/>
    <circle cx="200" cy="328" r="11"/><circle cx="312" cy="328" r="11"/>
    <circle cx="220" cy="362" r="11"/><circle cx="292" cy="362" r="11"/>
  </g>
  <!-- center crossing node emphasized -->
  <circle cx="256" cy="256" r="15" fill="#FFFFFF"/>
  <circle cx="256" cy="256" r="6" fill="#1F6FA8"/>
</svg>
